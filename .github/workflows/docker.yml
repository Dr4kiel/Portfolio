name: Docker Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & export image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Derive a short SHA tag (e.g. sha-a1b2c3d)
      - name: Compute image tag
        id: meta
        run: echo "tag=portfolio:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tag }}
          # Export to Docker daemon so we can save it
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image to tar
        run: docker save ${{ steps.meta.outputs.tag }} | gzip > portfolio-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-image-${{ github.sha }}
          path: portfolio-image.tar.gz
          retention-days: 7
          if-no-files-found: error
